<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDesk</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="container">

        <!-- Welcome Heading -->
        <h1 id="heading"></h1>

        <!-- Today's Focus -->
        <div class="focus-card">

            <h2>🎯 Today's Focus</h2>

            <p id="tagline"></p>

            <input
                type="text"
                id="focusInput"
                placeholder="Enter today's focus"
            >

            <button id="updateBtn">
                Update Focus
            </button>

        </div>

        <!-- Quick Notes -->
        <div class="notes-card">

            <h2>📝 Quick Notes</h2>

            <input
                type="text"
                id="noteInput"
                placeholder="Write a note..."
            >

            <button id="addNoteBtn">
                Add Note
            </button>

            <ul id="notesList"></ul>

        </div>

    </div>

    <!-- JavaScript Files -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/focus.js"></script>
    <script src="assets/js/notes.js"></script>
    <script src="assets/js/app.js"></script>

</body>

</html>
