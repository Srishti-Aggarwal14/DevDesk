<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DevDesk</title>

    <link rel="stylesheet"
          href="assets/css/style.css">

</head>

<body>

    <div class="container">

        <!-- ===========================
             Navigation
        ============================ -->

        <nav class="navbar">

            <h2>🚀 DevDesk</h2>

            <div class="nav-right">

                <div class="date-time">

                    <p id="currentDate"></p>

                    <p id="currentTime"></p>

                </div>

                <button id="themeBtn">
                    🌙
                </button>

            </div>

        </nav>

        <!-- ===========================
             Greeting
        ============================ -->

        <div class="greeting-section">

            <h1 id="heading"></h1>

            <p id="motivation"></p>

        </div>

        <!-- ===========================
             Today's Focus
        ============================ -->

        <div class="focus-card">

            <h2>🎯 Today's Focus</h2>

            <p id="tagline"></p>

            <input
                id="focusInput"
                type="text"
                placeholder="Enter today's focus">

            <button id="updateBtn">

                Update Focus

            </button>

        </div>

        <!-- ===========================
             Quick Notes
        ============================ -->

        <div class="notes-card">

            <h2>📝 Quick Notes</h2>

            <input
                id="noteInput"
                type="text"
                placeholder="Write a note...">

            <button id="addNoteBtn">

                Add Note

            </button>

            <ul id="notesList"></ul>

        </div>

        <!-- ===========================
             Pomodoro Timer
        ============================ -->

        <div class="timer-card">

            <h2>🍅 Pomodoro Timer</h2>

            <h1 id="timerDisplay">

                25:00

            </h1>

            <div class="timer-buttons">

                <button id="startTimer">

                    ▶️ Start

                </button>

                <button id="pauseTimer">

                    ⏸ Pause

                </button>

                <button id="resetTimer">

                    🔄 Reset

                </button>

            </div>

        </div>

        <!-- ===========================
             Productivity Dashboard
        ============================ -->

        <div class="dashboard-card">

            <h2>📊 Productivity Dashboard</h2>

            <div class="stats">

                <div class="stat-box">

                    <h3 id="notesCount">0</h3>

                    <p>Notes</p>

                </div>

                <div class="stat-box">

                    <h3 id="focusCount">0</h3>

                    <p>Focus Updates</p>

                </div>

                <div class="stat-box">

                    <h3 id="pomodoroCount">0</h3>

                    <p>Pomodoros</p>

                </div>

            </div>

            <!-- ===========================
                 Daily Progress
            ============================ -->

            <div class="progress-section">

                <h3>📈 Daily Progress</h3>

                <div class="progress-bar">

                    <div id="progressFill"></div>

                </div>

                <p id="progressText">0%</p>

            </div>

        </div>

    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/focus.js"></script>
    <script src="assets/js/notes.js"></script>
    <script src="assets/js/app.js"></script>

</body>

</html>
